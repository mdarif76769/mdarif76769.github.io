<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RS5AppsStore Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght=400;600;700&family=VT323&display=swap');
        
        :root {
            --green: #00ff9f;
            --green-glow: rgba(0, 255, 159, 0.35);
            --cyan: #25dfff;
            --panel: rgba(5, 18, 14, 0.9);
            --text: #e6fff4;
            --danger: #ff4770;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { min-height: 100%; touch-action: manipulation; background: #010504; overflow-x: hidden; margin: 0; }
        body { color: var(--text); font-family: 'Fira Code', monospace; padding-bottom: 30px; }

        /* গ্লোবাল ব্যাকগ্রাউন্ড ইফেক্টস */
        .matrix-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.12; pointer-events: none; background: linear-gradient(180deg, rgba(0,255,159,0.1) 0%, transparent 100%); }
        
        .app-shell { position: relative; z-index: 1; width: min(440px, 100%); margin: 0 auto; padding: 20px 14px; }
        
        /* প্রিমিয়াম টপ হেডার */
        .top-header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .avatar-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 2px solid var(--green); box-shadow: 0 0 20px var(--green-glow); overflow: hidden; }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }
        .bot-name { font-family: 'VT323', monospace; font-size: 52px; color: var(--green); margin: 0; text-shadow: 0 0 12px var(--green); letter-spacing: 1px; }

        /* সুন্দর প্যানেল কন্টেইনার */
        .cyber-panel { position: relative; background: var(--panel); border: 1px solid var(--green); border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 0 15px rgba(0,255,159,0.15); }
        .panel-header { font-size: 11px; text-transform: uppercase; color: var(--cyan); letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 700; border-bottom: 1px dashed rgba(0,255,159,0.2); padding-bottom: 6px; }

        /* লক স্ক্রিন ডিজাইন */
        .lock-wrapper { display: none; margin-top: 30px; place-items: center; width: 100%; }
        .lock-card { width: 100%; text-align: center; padding: 30px 20px; border-radius: 14px; border: 2px solid var(--green); box-shadow: 0 0 25px rgba(0,255,159,0.25); }
        .lock-icon { font-size: 32px; margin-bottom: 15px; text-shadow: 0 0 10px var(--cyan); color: var(--cyan); }
        .lock-input { width: 100%; height: 46px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,159,0.5); border-radius: 8px; color: #fff; padding: 0 15px; font-family: inherit; text-align: center; font-size: 14px; margin-bottom: 15px; outline: none; transition: all 0.3s; }
        .lock-input:focus { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }
        .cyber-btn { width: 100%; height: 46px; background: linear-gradient(135deg, #00ff9f, #00b36b); color: #000; border: none; border-radius: 8px; font-weight: 700; font-family: inherit; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px var(--green-glow); transition: all 0.2s; }
        .cyber-btn:active { transform: scale(0.98); }
        .cyber-btn:disabled { background: #22332a; color: #555; box-shadow: none; cursor: not-allowed; border: 1px solid #33443a; }
        .lock-error { color: var(--danger); font-size: 12px; margin-top: 12px; min-height: 18px; font-weight: 600; }

        /* সিস্টেম স্ট্যাটাস রো */
        .status-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
        .status-row strong { color: var(--green); }

        /* সার্চ বক্স */
        .search-box { width: 100%; height: 44px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,255,159,0.4); border-radius: 8px; color: #fff; padding: 0 14px; font-family: inherit; font-size: 13px; outline: none; }
        .search-box:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(37,223,255,0.2); }

        /* অ্যাপস গ্রিড ও কার্ড লাক্সারি লুক */
        .card-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
        .card { position: relative; background: rgba(2, 12, 9, 0.85); border: 1px solid var(--green); border-radius: 12px; padding: 20px 12px; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; width: 100%; transition: all 0.2s ease-in-out; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-3px); border-color: var(--cyan); box-shadow: 0 0 18px rgba(37,223,255,0.3); }
        
        .icon-frame { width: 66px; height: 66px; border-radius: 16px; border: 1px solid rgba(0,255,159,0.4); overflow: hidden; background: #000; display: grid; place-items: center; box-shadow: inset 0 0 10px rgba(0,255,159,0.2); }
        .icon-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-name { margin: 0; font-size: 13px; font-weight: 700; text-align: center; overflow-wrap: anywhere; text-shadow: 0 0 8px rgba(0,255,159,0.3); color: var(--text); line-height: 1.3; }
        .download-count { color: var(--cyan); font-size: 11px; font-weight: 600; background: rgba(37,223,255,0.08); padding: 2px 8px; border-radius: 12px; border: 1px solid rgba(37,223,255,0.15); }

        /* ব্যাজ */
        .badge-chip { position: absolute; top: 8px; right: 8px; padding: 2px 6px; border-radius: 6px; background: rgba(37,223,255,0.15); border: 1px solid rgba(37,223,255,0.4); color: var(--cyan); font-size: 9px; text-transform: uppercase; font-weight: 700; }
        .rank-badge { position: absolute; top: 8px; left: 8px; padding: 2px 6px; border-radius: 6px; background: rgba(0,255,159,0.12); border: 1px solid rgba(0,255,159,0.3); color: var(--green); font-size: 9px; font-weight: 700; }

        /* টপ রিলিজ লিডারবোর্ড */
        .rank-list { display: flex; flex-direction: column; gap: 8px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(0,255,159,0.03); border: 1px dashed rgba(0,255,159,0.2); border-radius: 8px; font-size: 12px; }
        .rank-item .meta { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .rank-num { font-weight: 700; }
        .rank-num.top3 { color: var(--gold); text-shadow: 0 0 6px var(--gold); }
        .rank-name { color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .rank-score { color: var(--cyan); font-weight: 600; }

        /* ডায়নামিক মডাল ওভারলে থিম (UI উন্নত করা হয়েছে) */
        .w8-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .w8-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .w8-modal { background: rgba(2, 10, 8, 0.98); border: 2px solid var(--green); border-radius: 16px; width: min(340px, 92%); padding: 25px; box-shadow: 0 0 35px rgba(0,255,159,0.4); text-align: center; transform: scale(0.85); transition: transform 0.3s ease; }
        .w8-modal-overlay.active .w8-modal { transform: scale(1); }
    </style>
</head>
<body>
    <div class="matrix-bg" aria-hidden="true"></div>
    
    <main class="app-shell">
        <header class="top-header">
            <div class="avatar-container"><img id="main-logo" src="" alt="Avatar"></div>
            <h1 class="bot-name">W8AppsStore</h1>
        </header>

        <section class="lock-wrapper" id="terminal-lock-panel">
            <div class="lock-card cyber-panel">
                <div class="lock-icon">🔒</div>
                <div class="panel-header">SECURITY KEY VALIDATION REQUIRED</div>
                <input class="lock-input" type="password" id="terminal-pass-input" placeholder="Enter Secure Passcode...">
                <button class="cyber-btn" id="decrypt-btn" onclick="verifyTerminalPasscode()">Decrypt Core</button>
                <div class="lock-error" id="terminal-error-log"></div>
            </div>
        </section>

        <div id="protected-store-area" style="display: none;">
            <section class="cyber-panel">
                <div class="panel-header">🔥 Top Installed (Real-Time)</div>
                <div class="rank-list" id="ranking-container"></div>
            </section>

            <section class="cyber-panel">
                <div class="panel-header">System Parameters</div>
                <div class="status-row"><span>Terminal Database Synced:</span><strong id="total-apps">Loading...</strong></div>
            </section>

            <section class="cyber-panel">
                <div class="panel-header">Search Directory</div>
                <input class="search-box" id="app-search" type="search" placeholder="Filter secure files...">
            </section>

            <section class="card-grid" id="apps-container" aria-label="Secure Apps"></section>
        </div>
    </main>

    <div class="w8-modal-overlay" id="w8ModalOverlay">
        <div class="w8-modal">
            <div style="font-size: 28px; margin-bottom: 10px;">📦</div>
            <div class="w8-modal-title" id="w8ModalTitle" style="color: var(--green); font-size: 18px; font-weight: 700; margin-bottom: 8px;">App Title</div>
            <div class="w8-modal-stats" id="w8ModalStats" style="color: var(--cyan); font-size: 13px; margin-bottom: 22px;">0 Downloads</div>
            <div class="w8-btn-container">
                <button class="w8-download-btn" id="w8ModalDownloadBtn">⚡ Deploy Download</button>
                <button class="w8-close-btn" style="margin-top: 8px;" onclick="closeW8Modal()">Abort Connection</button>
            </div>
        </div>
    </div>

    <script src="store_logic.js"></script>
</body>
</html>
