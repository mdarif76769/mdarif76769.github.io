<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AppsStore</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght=400;600;700&family=VT323&display=swap');
        :root{--green:#00ff9f;--green-soft:rgba(0,255,159,.28);--cyan:#25dfff;--panel:rgba(3,15,12,.82);--text:#d9fff0;--danger:#ff4770;--gold:#ffd700}
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;touch-action:manipulation;oversample-behavior:none;-webkit-text-size-adjust:100%;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}body{margin:0;color:var(--text);font-family:'Fira Code',Consolas,monospace;background:radial-gradient(circle at 50% 0%,rgba(0,255,159,.18),transparent 34%),radial-gradient(circle at 15% 86%,rgba(37,223,255,.12),transparent 30%),linear-gradient(180deg,#020303 0%,#06110e 54%,#010202 100%);overflow-x:hidden}
        
        .matrix{position:fixed;inset:-20% 0;z-index:0;pointer-events:none;overflow:hidden;display:grid;grid-template-columns:repeat(auto-fill, minmax(16px, 1fr));gap:8px;width:100vw;opacity:.18}
        .matrix span{color:var(--green);font-family:'VT323',monospace;font-size:20px;line-height:.9;writing-mode:vertical-rl;text-orientation:upright;text-shadow:0 0 9px var(--green);animation:matrixFall 7s linear infinite}
        
        .particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;background:radial-gradient(circle at 18% 20%,rgba(0,255,159,.28) 0 1px,transparent 2px),radial-gradient(circle at 72% 36%,rgba(37,223,255,.2) 0 1px,transparent 2px);background-size:120px 160px,180px 220px;animation:particleDrift 16s linear infinite;opacity:.62}
        .app-shell{position:relative;z-index:1;width:min(430px,100%);min-height:100vh;margin:0 auto;padding:26px 14px 32px}
        .top{position:relative;z-index:2;display:grid;justify-items:center;gap:16px;margin-bottom:18px}.avatar{position:relative;width:118px;height:118px;border-radius:50%;border:2px solid var(--green);background:rgba(0,0,0,.62);overflow:hidden}.avatar img{width:100%;height:100%;object-fit:cover;display:block}
        
        .title-panel,.detail-panel,.status-panel,.rank-panel,.lock-card{position:relative;overflow:hidden;border:1px solid var(--green);border-radius:8px;background:var(--panel);box-shadow:0 0 18px rgba(0,255,159,.28)}.bot-name{position:relative;z-index:1;margin:0;color:var(--green);font-family:'VT323',monospace;font-size:clamp(44px,14vw,66px);text-align:center;text-shadow:0 0 8px var(--green)}
        
        /* লক স্ক্রিন প্যানেল স্টাইল */
        .lock-container{display:none;position:relative;z-index:10;width:100%;padding:20px;margin-top:40px;place-items:center}.lock-card{width:100%;max-width:340px;padding:24px;text-align:center}.lock-title{color:var(--cyan);font-size:14px;text-transform:uppercase;margin-bottom:15px;letter-spacing:1px}.lock-input{width:100%;height:44px;background:rgba(0,0,0,0.5);border:1px solid var(--green);border-radius:6px;color:#fff;padding:0 12px;font-family:inherit;text-align:center;margin-bottom:12px;outline:none}.lock-btn{width:100%;height:44px;background:var(--green);color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;text-transform:uppercase}.lock-error{color:var(--danger);font-size:11px;margin-top:10px;min-height:16px}
        
        .status-panel{z-index:2;margin-bottom:14px;padding:13px;display:grid;gap:8px}.status-title{position:relative;z-index:1;color:var(--cyan);font-size:12px;text-transform:uppercase}.status-row{position:relative;z-index:1;display:flex;justify-content:space-between;gap:10px;font-size:13px}.status-row strong{color:var(--green)}
        .filter-panel{z-index:2;margin-bottom:14px;padding:13px}.filter-input{width:100%;min-height:44px;padding:10px 12px;border:1px solid rgba(0,255,159,.35);border-radius:8px;background:rgba(0,0,0,.28);color:var(--text);font:inherit}
        
        .card-grid{position:relative;z-index:2;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.card{position:relative;min-height:156px;display:grid;justify-items:center;align-content:center;gap:10px;overflow:hidden;padding:16px 10px;border:1px solid var(--green);border-radius:8px;color:var(--text);background:rgba(1,8,6,.82);box-shadow:0 0 15px rgba(0,255,159,.22);cursor:pointer;font-family:inherit;width:100%}.card:hover{transform:translateY(-2px);box-shadow:0 0 22px rgba(0,255,159,.36)}
        .icon{position:relative;z-index:1;width:62px;height:62px;display:grid;place-items:center;overflow:hidden;border:1px solid var(--green);border-radius:50%}.icon img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
        .app-name{position:relative;z-index:1;width:100%;margin:0;color:var(--text);font-size:13px;font-weight:700;text-align:center;overflow-wrap:anywhere}.download-count{position:relative;z-index:1;color:var(--cyan);font-size:11px}
        .badge-chip{position:absolute;top:10px;right:10px;z-index:3;padding:4px 8px;border-radius:999px;background:rgba(37,223,255,.16);border:1px solid rgba(37,223,255,.45);color:var(--cyan);font-size:10px;text-transform:uppercase}.rank-badge{position:absolute;top:10px;left:10px;z-index:3;padding:4px 8px;border-radius:999px;background:rgba(0,255,159,.12);border:1px solid rgba(0,255,159,.35);color:var(--green);font-size:10px;font-weight:700}
        
        .rank-panel{margin-bottom:14px;padding:13px}.rank-list{position:relative;z-index:1;display:flex;flex-direction:column;gap:8px;margin-top:8px}
        .rank-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 12px;background:rgba(0,255,159,.04);border:1px dashed rgba(0,255,159,.25);border-radius:6px;font-size:12px}
        .rank-item .meta{display:flex;align-items:center;gap:8px;min-width:0;overflow:hidden}.rank-num{font-size:13px;font-weight:700;color:var(--text)}.rank-num.top3{color:var(--gold)}.rank-name{font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank-score{color:var(--cyan);font-size:11px}
        @keyframes matrixFall{from{transform:translateY(-18%)}to{transform:translateY(22%)}}@keyframes particleDrift{to{background-position:120px 160px,-180px 220px}}
    </style>
</head>
<body>
    <div class="matrix" aria-hidden="true">
        <span>0101011108AFC0DE99010110BEEF</span><span>0101011108AFC0DE99010110BEEF</span>
    </div>
    <div class="particles" aria-hidden="true"></div>
    
    <main class="app-shell" id="main-store">
        <section class="top">
            <div class="avatar"><img id="main-logo" src="" alt="Logo"></div>
            <div class="title-panel"><h1 class="bot-name">W8AppsStore</h1></div>
        </section>

        <section class="lock-container" id="terminal-lock-panel">
            <div class="lock-card">
                <div class="lock-title">🔑 SECURITY AUTHENTICATION REQUIRED</div>
                <input class="lock-input" type="password" id="terminal-pass-input" placeholder="Enter Security Passcode...">
                <button class="lock-btn" onclick="verifyTerminalPasscode()">Decrypt Vault</button>
                <div class="lock-error" id="terminal-error-log"></div>
            </div>
        </section>

        <div id="protected-store-area" style="display: none;">
            <section class="rank-panel">
                <div class="status-title">🔥 Top Installed (Real-Time)</div>
                <div class="rank-list" id="ranking-container"></div>
            </section>

            <section class="status-panel">
                <div class="status-title">System Status</div>
                <div class="status-row"><span>Total Synced Items</span><strong id="total-apps">Loading...</strong></div>
            </section>

            <section class="filter-panel">
                <div class="status-title">Find Apps</div>
                <div class="filter-grid">
                    <input class="filter-input" id="app-search" type="search" placeholder="Search synced apps...">
                </div>
            </section>

            <section class="card-grid" id="apps-container" aria-label="Apps">
                <p style="grid-column: span 2; text-align: center; color: var(--cyan);">Loading apps store database...</p>
            </section>
        </div>
    </main>

    <script src="store_logic.js"></script>
</body>
</html>
